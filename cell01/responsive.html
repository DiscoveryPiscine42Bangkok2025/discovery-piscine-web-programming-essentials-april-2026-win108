<!DOCTYPE html>
<html>
<head>
    <title>Piscine Responsive Table</title>
    <style>
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        
        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse; 
        }

        td {
            border: 1px solid black;
            text-align: center;
            padding: 20px;
            font-family: sans-serif;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td style="background-color: darkolivegreen;"> first cell </td>
            <td style="background-color: palevioletred;"> second cell </td>
        </tr>
    </table>

</body>
</html>
